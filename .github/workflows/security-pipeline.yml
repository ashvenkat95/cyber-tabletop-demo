name: Security Demo Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

jobs:

  security-scan:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
      with:
        fetch-depth: 0  # Required for SonarCloud analysis

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install Backend Dependencies
      run: |
        cd backend
        npm install

    - name: Run ESLint
      run: cd backend && npx eslint .

    - name: Run Snyk Dependency Scan
      run: cd backend && npx snyk test
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    - name: SonarCloud Scan
      uses: SonarSource/sonarqube-scan-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    - name: Install Semgrep
      run: pip install semgrep

    - name: Run Semgrep Security Scan
      run: semgrep --config=p/security-audit .
      env:
        SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

    - name: Run GitLeaks Secret Scan
      continue-on-error: true
      run: |
        mkdir -p reports
        chmod 777 reports
        docker run --rm --user 0 --entrypoint sh \
        -v $PWD:/repo:ro \
        -v $PWD/reports:/reports \
        zricethezav/gitleaks:v8.18.0 -c "git config --global --add safe.directory /repo && gitleaks detect --source=/repo --report-path=/reports/gitleaks-report.json"

    - name: Display GitLeaks Report
      if: always()
      run: |
        if [ -f reports/gitleaks-report.json ]; then
          echo "=== GitLeaks Findings ==="
          cat reports/gitleaks-report.json | jq '.' 2>/dev/null || cat reports/gitleaks-report.json
        fi

    - name: Upload GitLeaks Report
      if: always() && hashFiles('reports/gitleaks-report.json') != ''
      uses: actions/upload-artifact@v4
      with:
        name: gitleaks-report
        path: reports/gitleaks-report.json
